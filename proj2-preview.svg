<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="bar2b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="340" x2="750" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="270" x2="750" y2="270" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="200" x2="750" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="130" x2="750" y2="130" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#2dd4bf" font-size="15" font-weight="700" letter-spacing="2">SQL DATABASE OPTIMIZATION</text>
  <!-- Bars group 1 - CRWD -->
  <rect x="110" y="180" width="38" height="160" fill="url(#bar2)" rx="4"/>
  <rect x="220" y="155" width="38" height="185" fill="url(#bar2)" rx="4"/>
  <rect x="330" y="120" width="38" height="220" fill="url(#bar2)" rx="4"/>
  <rect x="440" y="100" width="38" height="240" fill="url(#bar2)" rx="4"/>
  <rect x="550" y="80" width="38" height="260" fill="url(#bar2)" rx="4"/>
  <rect x="660" y="70" width="38" height="270" fill="url(#bar2)" rx="4"/>
  <!-- Bars group 2 - ZS -->
  <rect x="155" y="220" width="38" height="120" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <rect x="265" y="200" width="38" height="140" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <rect x="375" y="175" width="38" height="165" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <rect x="485" y="155" width="38" height="185" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <rect x="595" y="135" width="38" height="205" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <rect x="705" y="115" width="38" height="225" fill="url(#bar2b)" rx="4" opacity="0.85"/>
  <!-- X labels -->
  <text x="148" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2020</text>
  <text x="258" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2021</text>
  <text x="368" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2022</text>
  <text x="478" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2023</text>
  <text x="588" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2024</text>
  <text x="698" y="360" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">2025</text>
  <!-- Legend -->
  <rect x="200" y="395" width="12" height="12" fill="#2dd4bf" rx="2"/>
  <text x="218" y="406" fill="rgba(255,255,255,0.7)" font-size="12">CRWD Revenue</text>
  <rect x="360" y="395" width="12" height="12" fill="#60a5fa" rx="2"/>
  <text x="378" y="406" fill="rgba(255,255,255,0.7)" font-size="12">ZS Revenue</text>
  <!-- KPI boxes -->
  <rect x="80" y="378" width="90" height="32" fill="rgba(45,212,191,0.1)" rx="6" stroke="rgba(45,212,191,0.3)" stroke-width="1"/>
  <text x="125" y="398" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="700">6 Metrics</text>
  <rect x="660" y="378" width="90" height="32" fill="rgba(96,165,250,0.1)" rx="6" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="705" y="398" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">20 Quarters</text>
</svg>
