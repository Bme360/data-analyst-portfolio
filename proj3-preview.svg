<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#2a1a60"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#818cf8" font-size="15" font-weight="700" letter-spacing="2">STUDENT PERFORMANCE ANALYSIS</text>

  <!-- Donut chart left -->
  <circle cx="180" cy="185" r="80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="30"/>
  <circle cx="180" cy="185" r="80" fill="none" stroke="#818cf8" stroke-width="30" stroke-dasharray="170 332" stroke-dashoffset="83" transform="rotate(-90 180 185)"/>
  <circle cx="180" cy="185" r="80" fill="none" stroke="#2dd4bf" stroke-width="30" stroke-dasharray="110 392" stroke-dashoffset="-87" transform="rotate(-90 180 185)"/>
  <circle cx="180" cy="185" r="80" fill="none" stroke="#60a5fa" stroke-width="30" stroke-dasharray="52 450" stroke-dashoffset="-197" transform="rotate(-90 180 185)"/>
  <text x="180" y="178" text-anchor="middle" fill="white" font-size="22" font-weight="800">68%</text>
  <text x="180" y="198" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Pass Rate</text>

  <!-- Legend donut -->
  <rect x="80" y="290" width="10" height="10" fill="#818cf8" rx="2"/>
  <text x="96" y="300" fill="rgba(255,255,255,0.65)" font-size="11">Math (51%)</text>
  <rect x="80" y="310" width="10" height="10" fill="#2dd4bf" rx="2"/>
  <text x="96" y="320" fill="rgba(255,255,255,0.65)" font-size="11">Reading (33%)</text>
  <rect x="80" y="330" width="10" height="10" fill="#60a5fa" rx="2"/>
  <text x="96" y="340" fill="rgba(255,255,255,0.65)" font-size="11">Writing (16%)</text>

  <!-- Bar chart right - scores by group -->
  <text x="500" y="75" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Avg Score by Ethnic Group</text>
  <line x1="310" y1="90" x2="310" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="310" y1="280" x2="710" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Horizontal bars -->
  <text x="298" y="116" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Group A</text>
  <rect x="312" y="103" width="220" height="18" fill="#818cf8" rx="3" opacity="0.85"/>
  <text x="538" y="116" fill="rgba(255,255,255,0.7)" font-size="11">72.4</text>

  <text x="298" y="146" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Group B</text>
  <rect x="312" y="133" width="195" height="18" fill="#818cf8" rx="3" opacity="0.75"/>
  <text x="513" y="146" fill="rgba(255,255,255,0.7)" font-size="11">65.1</text>

  <text x="298" y="176" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Group C</text>
  <rect x="312" y="163" width="235" height="18" fill="#2dd4bf" rx="3" opacity="0.85"/>
  <text x="553" y="176" fill="rgba(255,255,255,0.7)" font-size="11">78.2</text>

  <text x="298" y="206" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Group D</text>
  <rect x="312" y="193" width="210" height="18" fill="#2dd4bf" rx="3" opacity="0.75"/>
  <text x="528" y="206" fill="rgba(255,255,255,0.7)" font-size="11">70.0</text>

  <text x="298" y="236" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Group E</text>
  <rect x="312" y="223" width="255" height="18" fill="#60a5fa" rx="3" opacity="0.9"/>
  <text x="573" y="236" fill="rgba(255,255,255,0.7)" font-size="11">84.9</text>

  <!-- KPI cards bottom -->
  <rect x="80" y="365" width="140" height="55" fill="rgba(129,140,248,0.1)" rx="8" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
  <text x="150" y="388" text-anchor="middle" fill="#818cf8" font-size="20" font-weight="800">1,000</text>
  <text x="150" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Students</text>

  <rect x="240" y="365" width="140" height="55" fill="rgba(45,212,191,0.1)" rx="8" stroke="rgba(45,212,191,0.25)" stroke-width="1"/>
  <text x="310" y="388" text-anchor="middle" fill="#2dd4bf" font-size="20" font-weight="800">5</text>
  <text x="310" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Dimensions</text>

  <rect x="400" y="365" width="140" height="55" fill="rgba(96,165,250,0.1)" rx="8" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
  <text x="470" y="388" text-anchor="middle" fill="#60a5fa" font-size="20" font-weight="800">SQL</text>
  <text x="470" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">ETL Pipeline</text>

  <rect x="560" y="365" width="160" height="55" fill="rgba(251,191,36,0.08)" rx="8" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="640" y="388" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="800">Power BI</text>
  <text x="640" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Interactive Dashboard</text>
</svg>
