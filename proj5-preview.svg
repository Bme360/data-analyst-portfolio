  <text x="265" y="348" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Household</text>

  <rect x="306" y="262" width="52" height="68" fill="url(#barG)" rx="4" opacity="0.65"/>
  <text x="332" y="255" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">$17K</text>
  <text x="332" y="348" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Beverages</text>

  <rect x="373" y="275" width="52" height="55" fill="url(#barG)" rx="4" opacity="0.55"/>
  <text x="399" y="268" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">$13K</text>
  <text x="399" y="348" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Fruits</text>

  <!-- Pie chart right - Sales by City -->
  <text x="650" y="168" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="12">Sales by City</text>
  <circle cx="650" cy="255" r="72" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="40"/>
  <circle cx="650" cy="255" r="72" fill="none" stroke="#2dd4bf" stroke-width="40" stroke-dasharray="135 317" stroke-dashoffset="90" transform="rotate(-90 650 255)"/>
  <circle cx="650" cy="255" r="72" fill="none" stroke="#818cf8" stroke-width="40" stroke-dasharray="113 317" stroke-dashoffset="-45" transform="rotate(-90 650 255)"/>
  <circle cx="650" cy="255" r="72" fill="none" stroke="#fbbf24" stroke-width="40" stroke-dasharray="69 317" stroke-dashoffset="-158" transform="rotate(-90 650 255)"/>
  <text x="650" y="250" text-anchor="middle" fill="white" font-size="16" font-weight="800">3</text>
  <text x="650" y="268" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">Cities</text>

  <!-- Pie legend -->
  <rect x="560" y="345" width="10" height="10" fill="#2dd4bf" rx="2"/>
  <text x="576" y="355" fill="rgba(255,255,255,0.6)" font-size="11">Yangon 42%</text>
  <rect x="650" y="345" width="10" height="10" fill="#818cf8" rx="2"/>
  <text x="666" y="355" fill="rgba(255,255,255,0.6)" font-size="11">Mandalay 36%</text>
  <rect x="560" y="365" width="10" height="10" fill="#fbbf24" rx="2"/>
  <text x="576" y="375" fill="rgba(255,255,255,0.6)" font-size="11">Naypyitaw 22%</text>

  <!-- Footer -->
  <text x="400" y="415" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="11">Python (Pandas) · Data Cleaning · EDA · Power BI · End-to-End Analysis</text>
</svg>
