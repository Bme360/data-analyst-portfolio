<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#4a1a20"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="safe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fb7185" font-size="15" font-weight="700" letter-spacing="2">SMART ROAD SAFETY AUDIT</text>

  <!-- Big KPI - Miss Rate -->
  <rect x="60" y="60" width="200" height="110" fill="rgba(251,113,133,0.1)" rx="12" stroke="rgba(251,113,133,0.3)" stroke-width="1"/>
  <text x="160" y="105" text-anchor="middle" fill="#fb7185" font-size="38" font-weight="800">23.4%</text>
  <text x="160" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Overall Miss Rate</text>
  <text x="160" y="150" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10">False Negatives</text>

  <!-- KPI 2 -->
  <rect x="285" y="60" width="160" height="110" fill="rgba(45,212,191,0.1)" rx="12" stroke="rgba(45,212,191,0.25)" stroke-width="1"/>
  <text x="365" y="105" text-anchor="middle" fill="#2dd4bf" font-size="38" font-weight="800">4,750</text>
  <text x="365" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Traffic Records</text>

  <!-- KPI 3 -->
  <rect x="465" y="60" width="160" height="110" fill="rgba(251,191,36,0.08)" rx="12" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="545" y="105" text-anchor="middle" fill="#fbbf24" font-size="38" font-weight="800">12</text>
  <text x="545" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Blind Spots Found</text>

  <!-- KPI 4 -->
  <rect x="645" y="60" width="115" height="110" fill="rgba(96,165,250,0.08)" rx="12" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="702" y="105" text-anchor="middle" fill="#60a5fa" font-size="24" font-weight="800">Fog/Rain</text>
  <text x="702" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Top Risk</text>
  <text x="702" y="150" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10">Weather Factor</text>

  <!-- Miss Rate by Weather - Horizontal bars -->
  <text x="60" y="210" fill="rgba(255,255,255,0.6)" font-size="12" font-weight="700">Miss Rate by Weather Condition</text>
  <line x1="60" y1="220" x2="760" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="140" y="248" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Heavy Fog</text>
  <rect x="148" y="234" width="330" height="20" fill="url(#danger)" rx="4"/>
  <text x="485" y="249" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700">42.1%</text>

  <text x="140" y="276" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Heavy Rain</text>
  <rect x="148" y="262" width="270" height="20" fill="url(#danger)" rx="4" opacity="0.8"/>
  <text x="425" y="277" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700">34.5%</text>

  <text x="140" y="304" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Light Rain</text>
  <rect x="148" y="290" width="185" height="20" fill="#fbbf24" rx="4" opacity="0.75"/>
  <text x="340" y="305" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700">23.6%</text>

  <text x="140" y="332" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Cloudy</text>
  <rect x="148" y="318" width="110" height="20" fill="url(#safe)" rx="4" opacity="0.8"/>
  <text x="265" y="333" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700">14.0%</text>

  <text x="140" y="360" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">Clear</text>
  <rect x="148" y="346" width="60" height="20" fill="url(#safe)" rx="4"/>
  <text x="215" y="361" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700">7.6%</text>

  <!-- Tools badge -->
  <rect x="490" y="230" width="270" height="130" fill="rgba(255,255,255,0.03)" rx="10" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="625" y="258" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">TECH STACK</text>
  <text x="625" y="285" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">SQL — Window Functions &amp; CTEs</text>
  <text x="625" y="308" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700">Power BI — DAX Measures</text>
  <text x="625" y="331" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">Data Modeling — Relational Schema</text>

  <!-- Footer -->
  <text x="400" y="415" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="11">4,750 records · ETL Pipeline · False Negative Detection Logic</text>
</svg>
